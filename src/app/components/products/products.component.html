<section id="productos" class="bg-white px-[5%] py-20">

  <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-12">
    <div>
      <p class="text-teal text-xs font-semibold tracking-widest uppercase mb-3">Nuestros productos</p>
      <h2 class="font-montserrat font-bold text-navy text-3xl leading-tight">
        Lo que fabricamos y distribuimos
      </h2>
    </div>
    <button
      (click)="scrollTo('contacto')"
      class="self-start md:self-auto bg-navy hover:bg-navy-dark text-white text-sm font-semibold px-6 py-3 rounded-lg border-none cursor-pointer transition-colors whitespace-nowrap">
      Solicitar catálogo →
    </button>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    @for (producto of productos; track producto.nombre) {
      <div class="border border-gray-100 rounded-2xl overflow-hidden hover:-translate-y-1 hover:shadow-xl transition-all duration-300">

        <!-- Imagen / fondo -->
        <div class="h-44 bg-gradient-to-br flex items-end p-4 relative {{ producto.gradiente }}">
          <span class="absolute top-3 left-3 bg-teal/20 border border-teal/40 text-teal-light text-[10px] font-semibold tracking-widest uppercase px-3 py-1 rounded-full">
            {{ producto.tag }}
          </span>
          <!-- Ícono molécula decorativo -->
          <svg viewBox="0 0 80 80" width="60" class="opacity-20" xmlns="http://www.w3.org/2000/svg">
            <circle cx="40" cy="12" r="10" fill="white"/>
            <circle cx="14" cy="54" r="9"  fill="white"/>
            <circle cx="66" cy="54" r="9"  fill="white"/>
            <line x1="40" y1="22" x2="14" y2="45" stroke="white" stroke-width="3"/>
            <line x1="40" y1="22" x2="66" y2="45" stroke="white" stroke-width="3"/>
          </svg>
        </div>

        <!-- Cuerpo -->
        <div class="p-5">
          <h3 class="font-montserrat font-bold text-navy text-base mb-2">
            {{ producto.nombre }}
          </h3>
          <p class="text-gray-500 text-sm leading-relaxed mb-4">
            {{ producto.descripcion }}
          </p>
          <div class="flex flex-wrap gap-1.5">
            @for (uso of producto.usos; track uso) {
              <span class="bg-teal-pale text-[#0f6e7a] text-[11px] font-semibold px-3 py-1 rounded-full">
                {{ uso }}
              </span>
            }
          </div>
        </div>

      </div>
    }
  </div>

</section>
