<footer class="bg-navy-dark px-[5%] pt-14 pb-6">

  <div class="grid grid-cols-1 md:grid-cols-3 gap-10 pb-10 border-b border-white/10">

    <!-- Marca -->
    <div>
      <p class="font-montserrat font-extrabold text-white text-base tracking-wide">QUÍMICA QUATTRO</p>
      <p class="font-montserrat font-medium text-teal text-xs tracking-widest mb-4">S.R.L.</p>
      <p class="text-white/50 text-sm leading-relaxed max-w-xs">
        Fabricación, fraccionamiento y distribución de desinfectantes, productos de limpieza
        y químicos industriales. Desde Santa Fe para todo el país.
      </p>
    </div>

    <!-- Navegación -->
    <div>
      <p class="font-montserrat font-bold text-white text-sm mb-5">Navegación</p>
      <ul class="flex flex-col gap-3 list-none p-0 m-0">
        <li><button (click)="scrollTo('nosotros')"  class="text-white/50 hover:text-teal text-sm bg-transparent border-none cursor-pointer transition-colors p-0">Nosotros</button></li>
        <li><button (click)="scrollTo('productos')" class="text-white/50 hover:text-teal text-sm bg-transparent border-none cursor-pointer transition-colors p-0">Productos</button></li>
        <li><button (click)="scrollTo('ventajas')"  class="text-white/50 hover:text-teal text-sm bg-transparent border-none cursor-pointer transition-colors p-0">Por qué elegirnos</button></li>
        <li><button (click)="scrollTo('contacto')"  class="text-white/50 hover:text-teal text-sm bg-transparent border-none cursor-pointer transition-colors p-0">Contacto</button></li>
      </ul>
    </div>

    <!-- Productos -->
    <div>
      <p class="font-montserrat font-bold text-white text-sm mb-5">Productos</p>
      <ul class="flex flex-col gap-3 list-none p-0 m-0">
        <li><button (click)="scrollTo('productos')" class="text-white/50 hover:text-teal text-sm bg-transparent border-none cursor-pointer transition-colors p-0">Ácido Peracético</button></li>
        <li><button (click)="scrollTo('productos')" class="text-white/50 hover:text-teal text-sm bg-transparent border-none cursor-pointer transition-colors p-0">Desinfectantes</button></li>
        <li><button (click)="scrollTo('productos')" class="text-white/50 hover:text-teal text-sm bg-transparent border-none cursor-pointer transition-colors p-0">Limpieza profesional</button></li>
        <li><button (click)="scrollTo('productos')" class="text-white/50 hover:text-teal text-sm bg-transparent border-none cursor-pointer transition-colors p-0">Químicos industriales</button></li>
      </ul>
    </div>

  </div>

  <!-- Bottom -->
  <div class="flex flex-col sm:flex-row justify-between items-center gap-3 pt-6">
    <p class="text-white/30 text-xs">
      © {{ anio }} Química Quattro S.R.L. Todos los derechos reservados.
    </p>
    <p class="text-white/20 text-xs">Santa Fe, Argentina</p>
  </div>

</footer>
