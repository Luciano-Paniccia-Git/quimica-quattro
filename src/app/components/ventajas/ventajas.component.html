<section id="ventajas" class="bg-navy px-[5%] py-20">

  <div class="mb-12">
    <p class="text-teal text-xs font-semibold tracking-widest uppercase mb-3">Por qué elegirnos</p>
    <h2 class="font-montserrat font-bold text-white text-3xl leading-tight mb-4">
      Calidad, respaldo y proximidad
    </h2>
    <p class="text-white/60 max-w-xl leading-relaxed">
      Trabajamos con empresas de distintos tamaños y rubros, ofreciendo soluciones confiables y atención personalizada.
    </p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
    @for (ventaja of ventajas; track ventaja.titulo) {
      <div class="bg-white/5 border border-white/10 rounded-2xl p-7 hover:bg-white/10 transition-colors duration-300">

        <div class="w-12 h-12 bg-teal/15 rounded-xl flex items-center justify-center mb-5">
          <svg class="w-6 h-6 text-teal" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="ventaja.icono"/>
          </svg>
        </div>

        <h3 class="font-montserrat font-bold text-white text-base mb-2">
          {{ ventaja.titulo }}
        </h3>
        <p class="text-white/60 text-sm leading-relaxed">
          {{ ventaja.texto }}
        </p>

      </div>
    }
  </div>

</section>
